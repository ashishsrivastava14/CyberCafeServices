<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Two cars with arrow -->
  <g transform="translate(120, 100)">
    <rect x="-40" y="-12" width="80" height="28" rx="12" fill="#3949ab" opacity="0.7"/>
    <rect x="-25" y="-22" width="45" height="15" rx="8" fill="#3949ab" opacity="0.5"/>
    <circle cx="-22" cy="16" r="8" fill="#1a237e"/>
    <circle cx="22" cy="16" r="8" fill="#1a237e"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(200, 100)">
    <line x1="-10" y1="0" x2="15" y2="0" stroke="#3949ab" stroke-width="3" stroke-linecap="round"/>
    <polygon points="18,0 10,-6 10,6" fill="#3949ab"/>
  </g>
  <!-- Second car -->
  <g transform="translate(280, 100)">
    <rect x="-40" y="-12" width="80" height="28" rx="12" fill="#3949ab" opacity="0.4"/>
    <rect x="-25" y="-22" width="45" height="15" rx="8" fill="#3949ab" opacity="0.3"/>
    <circle cx="-22" cy="16" r="8" fill="#1a237e" opacity="0.5"/>
    <circle cx="22" cy="16" r="8" fill="#1a237e" opacity="0.5"/>
  </g>
  <!-- Transfer document -->
  <g transform="translate(200, 200)">
    <rect x="-55" y="-25" width="110" height="55" rx="8" fill="#fff" stroke="#3949ab" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#3949ab" font-size="10" font-weight="bold" font-family="Arial">TRANSFER FORM</text>
    <rect x="-40" y="0" width="80" height="4" rx="2" fill="#7986cb"/>
    <rect x="-40" y="10" width="60" height="4" rx="2" fill="#c5cae9"/>
    <path d="M25 12 L30 17 L38 8" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#3949ab" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Vehicle Transfer</text>
</svg>
