<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Certificate -->
  <rect x="100" y="40" width="200" height="160" rx="10" fill="#fff" stroke="#283593" stroke-width="2.5"/>
  <rect x="110" y="50" width="180" height="140" rx="6" fill="none" stroke="#283593" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="200" y="75" text-anchor="middle" fill="#283593" font-size="11" font-weight="bold" font-family="Arial">GOVERNMENT OF INDIA</text>
  <text x="200" y="95" text-anchor="middle" fill="#283593" font-size="13" font-weight="bold" font-family="Arial">DOMICILE CERTIFICATE</text>
  <line x1="140" y1="100" x2="260" y2="100" stroke="#283593" stroke-width="1"/>
  <rect x="130" y="112" width="140" height="5" rx="2.5" fill="#7986cb"/>
  <rect x="130" y="124" width="120" height="5" rx="2.5" fill="#c5cae9"/>
  <rect x="130" y="136" width="130" height="5" rx="2.5" fill="#c5cae9"/>
  <rect x="130" y="148" width="100" height="5" rx="2.5" fill="#c5cae9"/>
  <circle cx="240" cy="170" r="12" fill="none" stroke="#283593" stroke-width="1.5"/>
  <text x="240" y="174" text-anchor="middle" fill="#283593" font-size="8" font-weight="bold">SEAL</text>
  <!-- House icon -->
  <g transform="translate(200, 240)">
    <circle cx="0" cy="0" r="22" fill="#283593" opacity="0.12"/>
    <polygon points="0,-14 -16,0 -12,0 -12,12 12,12 12,0 16,0" fill="#283593" opacity="0.8"/>
    <rect x="-4" y="2" width="8" height="10" rx="1" fill="#c5cae9"/>
  </g>
  <text x="200" y="285" text-anchor="middle" fill="#283593" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Domicile Certificate</text>
</svg>
