<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Wheat stalks -->
  <g transform="translate(200, 100)">
    <!-- Left stalk -->
    <line x1="-30" y1="50" x2="-15" y2="-30" stroke="#2e7d32" stroke-width="2.5"/>
    <ellipse cx="-22" cy="-10" rx="6" ry="12" fill="#66bb6a" transform="rotate(-25, -22, -10)"/>
    <ellipse cx="-18" cy="-25" rx="5" ry="10" fill="#66bb6a" transform="rotate(-20, -18, -25)"/>
    <ellipse cx="-26" cy="5" rx="6" ry="12" fill="#66bb6a" transform="rotate(-30, -26, 5)"/>
    <!-- Center stalk -->
    <line x1="0" y1="50" x2="0" y2="-40" stroke="#2e7d32" stroke-width="2.5"/>
    <ellipse cx="7" cy="-15" rx="6" ry="12" fill="#4caf50" transform="rotate(15, 7, -15)"/>
    <ellipse cx="-7" cy="-15" rx="6" ry="12" fill="#4caf50" transform="rotate(-15, -7, -15)"/>
    <ellipse cx="6" cy="5" rx="6" ry="12" fill="#4caf50" transform="rotate(20, 6, 5)"/>
    <ellipse cx="-6" cy="5" rx="6" ry="12" fill="#4caf50" transform="rotate(-20, -6, 5)"/>
    <ellipse cx="0" cy="-32" rx="5" ry="10" fill="#4caf50"/>
    <!-- Right stalk -->
    <line x1="30" y1="50" x2="15" y2="-30" stroke="#2e7d32" stroke-width="2.5"/>
    <ellipse cx="22" cy="-10" rx="6" ry="12" fill="#66bb6a" transform="rotate(25, 22, -10)"/>
    <ellipse cx="18" cy="-25" rx="5" ry="10" fill="#66bb6a" transform="rotate(20, 18, -25)"/>
    <ellipse cx="26" cy="5" rx="6" ry="12" fill="#66bb6a" transform="rotate(30, 26, 5)"/>
  </g>
  <!-- Document -->
  <rect x="140" y="175" width="120" height="70" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold" font-family="Arial">KISAN REGISTRATION</text>
  <rect x="155" y="205" width="90" height="4" rx="2" fill="#a5d6a7"/>
  <rect x="155" y="215" width="70" height="4" rx="2" fill="#c8e6c9"/>
  <rect x="155" y="225" width="80" height="4" rx="2" fill="#c8e6c9"/>
  <text x="200" y="275" text-anchor="middle" fill="#2e7d32" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Kisan Registration</text>
</svg>
