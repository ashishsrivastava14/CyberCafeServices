<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- PAN Card shape -->
  <rect x="90" y="60" width="220" height="140" rx="12" fill="#fff" stroke="#e65100" stroke-width="2.5"/>
  <!-- Government emblem -->
  <circle cx="200" cy="85" r="14" fill="#e65100" opacity="0.2"/>
  <text x="200" y="90" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold" font-family="Arial">॥</text>
  <!-- PAN text -->
  <text x="200" y="115" text-anchor="middle" fill="#e65100" font-size="16" font-weight="bold" font-family="Arial">INCOME TAX DEPT</text>
  <!-- Card number -->
  <rect x="120" y="130" width="160" height="20" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="200" y="145" text-anchor="middle" fill="#bf360c" font-size="13" font-weight="bold" font-family="monospace">ABCDE1234F</text>
  <!-- Photo area -->
  <rect x="245" y="158" width="45" height="30" rx="4" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <circle cx="267" cy="168" r="8" fill="#e65100" opacity="0.4"/>
  <path d="M257 183 Q267 175 277 183" fill="#e65100" opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="250" text-anchor="middle" fill="#e65100" font-size="18" font-weight="bold" font-family="Arial, sans-serif">PAN Card</text>
  <text x="200" y="272" text-anchor="middle" fill="#bf360c" font-size="12" font-family="Arial, sans-serif">Permanent Account Number</text>
</svg>
