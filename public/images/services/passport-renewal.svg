<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Passport booklet -->
  <g transform="translate(200, 110)">
    <rect x="-48" y="-58" width="100" height="120" rx="6" fill="#283593"/>
    <circle cx="2" cy="-15" r="20" fill="#283593" stroke="#fff" stroke-width="1.5"/>
    <text x="2" y="-10" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="serif">☸</text>
    <text x="2" y="15" text-anchor="middle" fill="#c5cae9" font-size="8" font-weight="bold" font-family="Arial">REPUBLIC OF INDIA</text>
    <text x="2" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="Arial">PASSPORT</text>
    <text x="2" y="43" text-anchor="middle" fill="#c5cae9" font-size="7" font-family="Arial">पासपोर्ट</text>
  </g>
  <!-- Renewal arrows -->
  <g transform="translate(310, 85)">
    <circle cx="0" cy="0" r="24" fill="#283593" opacity="0.15"/>
    <path d="M-12-4 A14 14 0 0 1 12-4" fill="none" stroke="#283593" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12 4 A14 14 0 0 1 -12 4" fill="none" stroke="#283593" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="12,-4 8,-9 16,-7" fill="#283593"/>
    <polygon points="-12,4 -8,9 -16,7" fill="#283593"/>
  </g>
  <text x="200" y="270" text-anchor="middle" fill="#283593" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Passport Renewal</text>
</svg>
