<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Voter ID card -->
  <rect x="100" y="65" width="200" height="120" rx="10" fill="#fff" stroke="#7b1fa2" stroke-width="2"/>
  <rect x="115" y="80" width="45" height="50" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <circle cx="137" cy="96" r="11" fill="#7b1fa2" opacity="0.3"/>
  <path d="M126 120 Q137 112 148 120" fill="#7b1fa2" opacity="0.3"/>
  <text x="225" y="90" text-anchor="middle" fill="#7b1fa2" font-size="9" font-weight="bold">VOTER ID CARD</text>
  <rect x="180" y="98" width="100" height="5" rx="2.5" fill="#ce93d8"/>
  <rect x="180" y="112" width="80" height="5" rx="2.5" fill="#e1bee7"/>
  <rect x="180" y="126" width="60" height="5" rx="2.5" fill="#e1bee7"/>
  <!-- Edit pencil -->
  <g transform="translate(310, 75)">
    <circle cx="0" cy="0" r="20" fill="#7b1fa2"/>
    <path d="M-6-8 L6-8 L4 8 L-4 8 Z" fill="#fff" opacity="0.3"/>
    <path d="M-4 4 L2-6 L6-2 L0 8 Z" fill="#fff"/>
    <line x1="3" y1="-7" x2="7" y2="-3" stroke="#fff" stroke-width="2"/>
  </g>
  <!-- Correction check -->
  <g transform="translate(200, 230)">
    <circle cx="0" cy="0" r="22" fill="#7b1fa2" opacity="0.15"/>
    <path d="M-8 0 L-3 5 L8-6" fill="none" stroke="#7b1fa2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#7b1fa2" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Voter ID Correction</text>
</svg>
