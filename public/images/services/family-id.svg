<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe"/>
      <stop offset="100%" style="stop-color:#b3e5fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Card -->
  <rect x="80" y="50" width="240" height="145" rx="12" fill="#fff" stroke="#0277bd" stroke-width="2.5"/>
  <text x="200" y="75" text-anchor="middle" fill="#0277bd" font-size="12" font-weight="bold" font-family="Arial">PARIVAR PEHCHAN PATRA</text>
  <text x="200" y="92" text-anchor="middle" fill="#0288d1" font-size="9" font-family="Arial">Family Identity Card — Haryana</text>
  <line x1="110" y1="100" x2="290" y2="100" stroke="#b3e5fc" stroke-width="1.5"/>
  <!-- Family -->
  <g transform="translate(200, 140)">
    <circle cx="-40" cy="-5" r="12" fill="#0277bd" opacity="0.3"/>
    <rect x="-48" y="10" width="16" height="22" rx="6" fill="#0277bd" opacity="0.3"/>
    <circle cx="-10" cy="-5" r="12" fill="#0277bd" opacity="0.4"/>
    <rect x="-18" y="10" width="16" height="22" rx="6" fill="#0277bd" opacity="0.4"/>
    <circle cx="18" cy="0" r="9" fill="#0277bd" opacity="0.25"/>
    <rect x="12" y="12" width="12" height="16" rx="4" fill="#0277bd" opacity="0.25"/>
    <circle cx="40" cy="0" r="9" fill="#0277bd" opacity="0.25"/>
    <rect x="34" y="12" width="12" height="16" rx="4" fill="#0277bd" opacity="0.25"/>
  </g>
  <!-- ID number -->
  <rect x="120" y="175" width="160" height="14" rx="4" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
  <text x="200" y="186" text-anchor="middle" fill="#0277bd" font-size="10" font-family="monospace">PPP-XXXX-XXXX-XXXX</text>
  <!-- Shield icon -->
  <g transform="translate(200, 240)">
    <path d="M0-18 L16-8 L14 10 Q8 18 0 20 Q-8 18 -14 10 L-16-8 Z" fill="#0277bd" opacity="0.15" stroke="#0277bd" stroke-width="1.5"/>
    <path d="M-5 2 L-1 6 L7-3" fill="none" stroke="#0277bd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="280" text-anchor="middle" fill="#0277bd" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Family ID Card</text>
</svg>
