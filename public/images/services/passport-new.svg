<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Passport booklet -->
  <g transform="translate(200, 120)">
    <!-- Back cover -->
    <rect x="-52" y="-65" width="104" height="135" rx="6" fill="#0d47a1" opacity="0.3"/>
    <!-- Front cover -->
    <rect x="-48" y="-62" width="100" height="130" rx="6" fill="#1565c0"/>
    <!-- Emblem area -->
    <circle cx="2" cy="-20" r="22" fill="#1565c0" stroke="#fff" stroke-width="1.5"/>
    <text x="2" y="-15" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="serif">☸</text>
    <!-- Text -->
    <text x="2" y="15" text-anchor="middle" fill="#bbdefb" font-size="8" font-weight="bold" font-family="Arial">REPUBLIC OF INDIA</text>
    <text x="2" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial">PASSPORT</text>
    <text x="2" y="45" text-anchor="middle" fill="#bbdefb" font-size="7" font-family="Arial">पासपोर्ट</text>
  </g>
  <!-- Globe -->
  <g transform="translate(310, 80)">
    <circle cx="0" cy="0" r="22" fill="#1565c0" opacity="0.15"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="8" ry="18" fill="none" stroke="#1565c0" stroke-width="1"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#1565c0" stroke-width="1"/>
    <path d="M-16-8 Q0-6 16-8" fill="none" stroke="#1565c0" stroke-width="0.8"/>
    <path d="M-16 8 Q0 6 16 8" fill="none" stroke="#1565c0" stroke-width="0.8"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#1565c0" font-size="18" font-weight="bold" font-family="Arial, sans-serif">New Passport</text>
</svg>
