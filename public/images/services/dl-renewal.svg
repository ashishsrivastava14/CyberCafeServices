<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- License card -->
  <rect x="100" y="60" width="200" height="120" rx="10" fill="#fff" stroke="#1a237e" stroke-width="2"/>
  <text x="200" y="85" text-anchor="middle" fill="#1a237e" font-size="10" font-weight="bold" font-family="Arial">DRIVING LICENSE</text>
  <rect x="120" y="95" width="160" height="6" rx="3" fill="#7986cb"/>
  <rect x="120" y="110" width="130" height="6" rx="3" fill="#9fa8da"/>
  <rect x="120" y="125" width="100" height="6" rx="3" fill="#9fa8da"/>
  <rect x="120" y="140" width="140" height="6" rx="3" fill="#c5cae9"/>
  <!-- Renewal arrows -->
  <g transform="translate(200, 225)">
    <circle cx="0" cy="0" r="32" fill="#1a237e" opacity="0.12"/>
    <path d="M-18-6 A20 20 0 0 1 18-6" fill="none" stroke="#1a237e" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M18 6 A20 20 0 0 1 -18 6" fill="none" stroke="#1a237e" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="18,-6 13,-12 22,-10" fill="#1a237e"/>
    <polygon points="-18,6 -13,12 -22,10" fill="#1a237e"/>
  </g>
  <text x="200" y="280" text-anchor="middle" fill="#1a237e" font-size="18" font-weight="bold" font-family="Arial, sans-serif">DL Renewal</text>
</svg>
