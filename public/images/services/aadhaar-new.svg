<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Aadhaar card shape -->
  <rect x="110" y="70" width="180" height="120" rx="12" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <rect x="125" y="85" width="50" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Person silhouette -->
  <circle cx="150" cy="100" r="12" fill="#2e7d32"/>
  <path d="M135 130 Q150 118 165 130" fill="#2e7d32"/>
  <!-- Lines -->
  <rect x="190" y="90" width="85" height="6" rx="3" fill="#66bb6a"/>
  <rect x="190" y="105" width="70" height="6" rx="3" fill="#a5d6a7"/>
  <rect x="190" y="120" width="60" height="6" rx="3" fill="#a5d6a7"/>
  <!-- Aadhaar logo circle -->
  <circle cx="230" cy="155" r="12" fill="#2e7d32"/>
  <text x="230" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">A</text>
  <!-- Fingerprint icon -->
  <g transform="translate(200, 210)">
    <circle cx="0" cy="0" r="22" fill="#2e7d32" opacity="0.15"/>
    <path d="M-8 4 Q-8-10 0-10 Q8-10 8 0 Q8 8 2 12" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/>
    <path d="M-4 6 Q-4-6 0-6 Q4-6 4 0 Q4 5 2 8" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 6 Q0-2 2-2 Q4-2 4 2" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="200" y="260" text-anchor="middle" fill="#2e7d32" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Aadhaar Card</text>
</svg>
