<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Car top view / side view -->
  <g transform="translate(200, 115)">
    <!-- Car body -->
    <rect x="-65" y="-20" width="130" height="45" rx="20" fill="#1565c0" opacity="0.8"/>
    <rect x="-45" y="-35" width="70" height="25" rx="12" fill="#1565c0" opacity="0.6"/>
    <!-- Windows -->
    <rect x="-35" y="-30" width="25" height="18" rx="5" fill="#bbdefb"/>
    <rect x="-2" y="-30" width="25" height="18" rx="5" fill="#bbdefb"/>
    <!-- Wheels -->
    <circle cx="-40" cy="25" r="12" fill="#0d47a1"/>
    <circle cx="-40" cy="25" r="5" fill="#bbdefb"/>
    <circle cx="40" cy="25" r="12" fill="#0d47a1"/>
    <circle cx="40" cy="25" r="5" fill="#bbdefb"/>
    <!-- Headlights -->
    <rect x="60" y="-8" width="8" height="8" rx="2" fill="#ffd54f"/>
    <rect x="-68" y="-8" width="8" height="8" rx="2" fill="#ef5350"/>
  </g>
  <!-- RC Book -->
  <rect x="130" y="165" width="140" height="80" rx="8" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <text x="200" y="185" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold" font-family="Arial">REGISTRATION CERTIFICATE</text>
  <rect x="145" y="195" width="110" height="5" rx="2.5" fill="#64b5f6"/>
  <rect x="145" y="207" width="90" height="5" rx="2.5" fill="#bbdefb"/>
  <rect x="145" y="219" width="100" height="5" rx="2.5" fill="#bbdefb"/>
  <text x="200" y="275" text-anchor="middle" fill="#1565c0" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Vehicle Registration</text>
</svg>
