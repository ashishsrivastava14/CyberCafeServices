<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- PAN Card mini -->
  <rect x="50" y="90" width="130" height="85" rx="10" fill="#fff" stroke="#6a1b9a" stroke-width="2"/>
  <text x="115" y="115" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold" font-family="Arial">PAN</text>
  <rect x="65" y="125" width="100" height="12" rx="3" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="115" y="135" text-anchor="middle" fill="#6a1b9a" font-size="9" font-family="monospace">ABCDE1234F</text>
  <rect x="65" y="148" width="70" height="5" rx="2.5" fill="#ce93d8"/>
  <!-- Aadhaar Card mini -->
  <rect x="220" y="90" width="130" height="85" rx="10" fill="#fff" stroke="#6a1b9a" stroke-width="2"/>
  <text x="285" y="115" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold" font-family="Arial">AADHAAR</text>
  <rect x="235" y="125" width="100" height="12" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="285" y="135" text-anchor="middle" fill="#2e7d32" font-size="9" font-family="monospace">1234 5678 9012</text>
  <rect x="235" y="148" width="70" height="5" rx="2.5" fill="#a5d6a7"/>
  <!-- Link chain -->
  <g transform="translate(200, 132)">
    <path d="M-20 0 Q-20-10 -12-10 L-4-10 Q4-10 4 0 Q4 10 -4 10 L-12 10 Q-20 10 -20 0" fill="none" stroke="#6a1b9a" stroke-width="3"/>
    <path d="M20 0 Q20-10 12-10 L4-10 Q-4-10 -4 0 Q-4 10 4 10 L12 10 Q20 10 20 0" fill="none" stroke="#6a1b9a" stroke-width="3"/>
  </g>
  <!-- Success check -->
  <g transform="translate(200, 225)">
    <circle cx="0" cy="0" r="22" fill="#6a1b9a"/>
    <path d="M-8 0 L-3 5 L8-6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="272" text-anchor="middle" fill="#6a1b9a" font-size="18" font-weight="bold" font-family="Arial, sans-serif">PAN-Aadhaar Link</text>
</svg>
