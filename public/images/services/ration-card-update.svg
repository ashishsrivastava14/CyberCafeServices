<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Ration card -->
  <rect x="110" y="55" width="180" height="115" rx="10" fill="#fff" stroke="#ef6c00" stroke-width="2"/>
  <text x="200" y="78" text-anchor="middle" fill="#ef6c00" font-size="11" font-weight="bold" font-family="Arial">RATION CARD</text>
  <rect x="130" y="90" width="140" height="5" rx="2.5" fill="#ffb74d"/>
  <rect x="130" y="104" width="110" height="5" rx="2.5" fill="#ffe0b2"/>
  <rect x="130" y="118" width="120" height="5" rx="2.5" fill="#ffe0b2"/>
  <rect x="130" y="132" width="90" height="5" rx="2.5" fill="#ffe0b2"/>
  <!-- Update/edit icon -->
  <g transform="translate(300, 75)">
    <circle cx="0" cy="0" r="20" fill="#ef6c00"/>
    <path d="M-4 4 L2-6 L6-2 L0 8 Z" fill="#fff"/>
    <line x1="3" y1="-7" x2="7" y2="-3" stroke="#fff" stroke-width="2"/>
  </g>
  <!-- Family members -->
  <g transform="translate(200, 225)">
    <circle cx="-25" cy="-8" r="10" fill="#ef6c00" opacity="0.25"/>
    <rect x="-32" y="5" width="14" height="18" rx="5" fill="#ef6c00" opacity="0.25"/>
    <circle cx="0" cy="-12" r="12" fill="#ef6c00" opacity="0.35"/>
    <rect x="-8" y="3" width="16" height="22" rx="6" fill="#ef6c00" opacity="0.35"/>
    <circle cx="25" cy="-8" r="10" fill="#ef6c00" opacity="0.25"/>
    <rect x="18" y="5" width="14" height="18" rx="5" fill="#ef6c00" opacity="0.25"/>
    <!-- Plus sign -->
    <circle cx="48" cy="0" r="10" fill="#ef6c00"/>
    <line x1="48" y1="-5" x2="48" y2="5" stroke="#fff" stroke-width="2.5"/>
    <line x1="43" y1="0" x2="53" y2="0" stroke="#fff" stroke-width="2.5"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#ef6c00" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Ration Card Update</text>
</svg>
