<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Steering wheel -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="55" fill="#fff" stroke="#00695c" stroke-width="3"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#00695c" stroke-width="6"/>
    <circle cx="0" cy="0" r="10" fill="#00695c"/>
    <line x1="0" y1="-10" x2="0" y2="-42" stroke="#00695c" stroke-width="4"/>
    <line x1="0" y1="10" x2="-36" y2="21" stroke="#00695c" stroke-width="4"/>
    <line x1="0" y1="10" x2="36" y2="21" stroke="#00695c" stroke-width="4"/>
  </g>
  <!-- L plate -->
  <g transform="translate(310, 80)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="#fff" stroke="#d32f2f" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" fill="#d32f2f" font-size="32" font-weight="bold" font-family="Arial">L</text>
  </g>
  <text x="200" y="220" text-anchor="middle" fill="#00695c" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Learning License</text>
  <text x="200" y="242" text-anchor="middle" fill="#00897b" font-size="12" font-family="Arial, sans-serif">Learner's Driving Permit</text>
</svg>
