<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Electric pole -->
  <g transform="translate(200, 60)">
    <rect x="-4" y="0" width="8" height="120" fill="#795548"/>
    <!-- Cross bars -->
    <rect x="-40" y="10" width="80" height="5" rx="2" fill="#795548"/>
    <rect x="-30" y="30" width="60" height="5" rx="2" fill="#795548"/>
    <!-- Wires -->
    <path d="M-40 12 Q-60 40 -80 12" fill="none" stroke="#f57f17" stroke-width="2"/>
    <path d="M40 12 Q60 40 80 12" fill="none" stroke="#f57f17" stroke-width="2"/>
    <path d="M-30 32 Q-45 55 -60 32" fill="none" stroke="#f57f17" stroke-width="1.5"/>
    <path d="M30 32 Q45 55 60 32" fill="none" stroke="#f57f17" stroke-width="1.5"/>
    <!-- Lightning symbols -->
    <polygon points="-2,-8 5,-2 1,-2 4,8 -3,2 1,2" fill="#f9a825"/>
  </g>
  <!-- Plug icon -->
  <g transform="translate(200, 225)">
    <circle cx="0" cy="0" r="25" fill="#f57f17" opacity="0.15"/>
    <rect x="-8" y="-12" width="16" height="14" rx="3" fill="#f57f17"/>
    <line x1="-4" y1="-12" x2="-4" y2="-18" stroke="#f57f17" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="-12" x2="4" y2="-18" stroke="#f57f17" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="0" y2="15" stroke="#f57f17" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#f57f17" font-size="18" font-weight="bold" font-family="Arial, sans-serif">New Connection</text>
</svg>
