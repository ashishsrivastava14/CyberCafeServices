<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eceff1"/>
      <stop offset="100%" style="stop-color:#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Certificate -->
  <rect x="100" y="35" width="200" height="160" rx="10" fill="#fff" stroke="#37474f" stroke-width="2.5"/>
  <rect x="110" y="45" width="180" height="140" rx="6" fill="none" stroke="#37474f" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="200" y="70" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold" font-family="Arial">MUNICIPAL CORPORATION</text>
  <text x="200" y="90" text-anchor="middle" fill="#37474f" font-size="14" font-weight="bold" font-family="Arial">DEATH CERTIFICATE</text>
  <line x1="140" y1="97" x2="260" y2="97" stroke="#37474f" stroke-width="1"/>
  <rect x="130" y="110" width="140" height="5" rx="2.5" fill="#78909c"/>
  <rect x="130" y="122" width="120" height="5" rx="2.5" fill="#cfd8dc"/>
  <rect x="130" y="134" width="130" height="5" rx="2.5" fill="#cfd8dc"/>
  <rect x="130" y="146" width="100" height="5" rx="2.5" fill="#cfd8dc"/>
  <rect x="130" y="158" width="110" height="5" rx="2.5" fill="#cfd8dc"/>
  <circle cx="245" cy="170" r="10" fill="none" stroke="#37474f" stroke-width="1.5"/>
  <!-- Candle icon -->
  <g transform="translate(200, 235)">
    <circle cx="0" cy="0" r="22" fill="#37474f" opacity="0.1"/>
    <rect x="-3" y="-5" width="6" height="18" rx="2" fill="#37474f" opacity="0.5"/>
    <!-- Flame -->
    <path d="M0-14 Q5-8 3-5 Q0-3 -3-5 Q-5-8 0-14 Z" fill="#ff9800" opacity="0.7"/>
    <path d="M0-12 Q3-9 1-6 Q0-5 -1-6 Q-3-9 0-12 Z" fill="#ffc107" opacity="0.8"/>
    <!-- Base -->
    <ellipse cx="0" cy="14" rx="8" ry="3" fill="#37474f" opacity="0.4"/>
  </g>
  <text x="200" y="278" text-anchor="middle" fill="#37474f" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Death Certificate</text>
</svg>
