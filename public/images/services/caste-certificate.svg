<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Certificate scroll -->
  <rect x="100" y="40" width="200" height="170" rx="10" fill="#fff" stroke="#880e4f" stroke-width="2.5"/>
  <rect x="110" y="50" width="180" height="150" rx="6" fill="none" stroke="#880e4f" stroke-width="0.5" stroke-dasharray="4 2"/>
  <!-- Content -->
  <text x="200" y="75" text-anchor="middle" fill="#880e4f" font-size="11" font-weight="bold" font-family="Arial">GOVERNMENT OF INDIA</text>
  <text x="200" y="95" text-anchor="middle" fill="#880e4f" font-size="14" font-weight="bold" font-family="Arial">CASTE CERTIFICATE</text>
  <line x1="140" y1="102" x2="260" y2="102" stroke="#880e4f" stroke-width="1"/>
  <rect x="130" y="115" width="140" height="5" rx="2.5" fill="#f48fb1"/>
  <rect x="130" y="127" width="120" height="5" rx="2.5" fill="#f8bbd0"/>
  <rect x="130" y="139" width="130" height="5" rx="2.5" fill="#f8bbd0"/>
  <rect x="130" y="151" width="100" height="5" rx="2.5" fill="#f8bbd0"/>
  <rect x="130" y="163" width="110" height="5" rx="2.5" fill="#f8bbd0"/>
  <!-- Official seal -->
  <circle cx="240" cy="180" r="12" fill="none" stroke="#880e4f" stroke-width="1.5"/>
  <text x="240" y="184" text-anchor="middle" fill="#880e4f" font-size="8" font-weight="bold">SEAL</text>
  <!-- Verified badge -->
  <g transform="translate(200, 250)">
    <circle cx="0" cy="0" r="18" fill="#880e4f" opacity="0.15"/>
    <path d="M-6 0 L-2 4 L6-4" fill="none" stroke="#880e4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="288" text-anchor="middle" fill="#880e4f" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Caste Certificate</text>
</svg>
