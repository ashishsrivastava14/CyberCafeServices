<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efebe9"/>
      <stop offset="100%" style="stop-color:#d7ccc8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Stamp paper -->
  <rect x="100" y="35" width="200" height="175" rx="8" fill="#fff" stroke="#4e342e" stroke-width="2.5"/>
  <!-- Ornate border -->
  <rect x="110" y="45" width="180" height="155" rx="4" fill="none" stroke="#4e342e" stroke-width="0.8" stroke-dasharray="6 3"/>
  <!-- Header -->
  <text x="200" y="70" text-anchor="middle" fill="#4e342e" font-size="10" font-weight="bold" font-family="Arial">GOVERNMENT OF INDIA</text>
  <text x="200" y="88" text-anchor="middle" fill="#4e342e" font-size="14" font-weight="bold" font-family="Arial">e-STAMP PAPER</text>
  <line x1="130" y1="95" x2="270" y2="95" stroke="#4e342e" stroke-width="1"/>
  <!-- Amount -->
  <rect x="140" y="105" width="120" height="25" rx="4" fill="#efebe9" stroke="#4e342e" stroke-width="1"/>
  <text x="200" y="123" text-anchor="middle" fill="#4e342e" font-size="16" font-weight="bold" font-family="Arial">₹ 100/-</text>
  <!-- Content lines -->
  <rect x="130" y="140" width="140" height="5" rx="2.5" fill="#bcaaa4"/>
  <rect x="130" y="152" width="120" height="5" rx="2.5" fill="#d7ccc8"/>
  <rect x="130" y="164" width="130" height="5" rx="2.5" fill="#d7ccc8"/>
  <rect x="130" y="176" width="100" height="5" rx="2.5" fill="#d7ccc8"/>
  <!-- Seal -->
  <circle cx="245" cy="190" r="10" fill="none" stroke="#4e342e" stroke-width="1.5"/>
  <!-- Scale of justice -->
  <g transform="translate(200, 245)">
    <circle cx="0" cy="0" r="20" fill="#4e342e" opacity="0.12"/>
    <line x1="0" y1="-12" x2="0" y2="8" stroke="#4e342e" stroke-width="2"/>
    <line x1="-14" y1="-8" x2="14" y2="-8" stroke="#4e342e" stroke-width="2"/>
    <path d="M-14-8 L-18 4 L-10 4 Z" fill="#4e342e" opacity="0.5"/>
    <path d="M14-8 L18 4 L10 4 Z" fill="#4e342e" opacity="0.5"/>
    <rect x="-4" y="8" width="8" height="4" rx="1" fill="#4e342e"/>
  </g>
  <text x="200" y="285" text-anchor="middle" fill="#4e342e" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Affidavit / Stamp Paper</text>
</svg>
