<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Card -->
  <rect x="80" y="55" width="240" height="140" rx="12" fill="#fff" stroke="#e65100" stroke-width="2.5"/>
  <text x="200" y="80" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold" font-family="Arial">JANAADHAAR CARD</text>
  <text x="200" y="95" text-anchor="middle" fill="#ef6c00" font-size="9" font-family="Arial">Rajasthan Government</text>
  <line x1="110" y1="102" x2="290" y2="102" stroke="#ffe0b2" stroke-width="1.5"/>
  <!-- Family members -->
  <g transform="translate(200, 140)">
    <!-- Father -->
    <circle cx="-30" cy="-8" r="11" fill="#e65100" opacity="0.3"/>
    <rect x="-37" y="6" width="14" height="20" rx="5" fill="#e65100" opacity="0.3"/>
    <!-- Mother -->
    <circle cx="0" cy="-8" r="11" fill="#e65100" opacity="0.4"/>
    <rect x="-7" y="6" width="14" height="20" rx="5" fill="#e65100" opacity="0.4"/>
    <!-- Child 1 -->
    <circle cx="25" cy="-2" r="8" fill="#e65100" opacity="0.25"/>
    <rect x="20" y="8" width="10" height="14" rx="4" fill="#e65100" opacity="0.25"/>
    <!-- Child 2 -->
    <circle cx="45" cy="-2" r="8" fill="#e65100" opacity="0.25"/>
    <rect x="40" y="8" width="10" height="14" rx="4" fill="#e65100" opacity="0.25"/>
  </g>
  <!-- Rajasthan icon -->
  <g transform="translate(200, 240)">
    <circle cx="0" cy="0" r="20" fill="#e65100" opacity="0.15"/>
    <polygon points="0,-12 -14,8 14,8" fill="none" stroke="#e65100" stroke-width="2"/>
    <circle cx="0" cy="2" r="5" fill="#e65100" opacity="0.4"/>
  </g>
  <text x="200" y="280" text-anchor="middle" fill="#e65100" font-size="18" font-weight="bold" font-family="Arial, sans-serif">JanAadhar Card</text>
</svg>
