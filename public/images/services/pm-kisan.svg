<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Bank building -->
  <g transform="translate(200, 90)">
    <!-- Roof -->
    <polygon points="-60,20 0,-20 60,20" fill="#1b5e20" opacity="0.8"/>
    <!-- Pillars -->
    <rect x="-45" y="20" width="12" height="50" fill="#fff" stroke="#1b5e20" stroke-width="1.5"/>
    <rect x="-17" y="20" width="12" height="50" fill="#fff" stroke="#1b5e20" stroke-width="1.5"/>
    <rect x="5" y="20" width="12" height="50" fill="#fff" stroke="#1b5e20" stroke-width="1.5"/>
    <rect x="33" y="20" width="12" height="50" fill="#fff" stroke="#1b5e20" stroke-width="1.5"/>
    <!-- Base -->
    <rect x="-55" y="70" width="110" height="10" rx="2" fill="#1b5e20" opacity="0.6"/>
  </g>
  <!-- Rupee symbol -->
  <g transform="translate(200, 205)">
    <circle cx="0" cy="0" r="28" fill="#fff" stroke="#1b5e20" stroke-width="2.5"/>
    <text x="0" y="10" text-anchor="middle" fill="#1b5e20" font-size="30" font-weight="bold" font-family="Arial">₹</text>
  </g>
  <!-- Money flowing -->
  <g transform="translate(200, 205)">
    <circle cx="-50" cy="-10" r="4" fill="#4caf50" opacity="0.4"/>
    <circle cx="50" cy="-10" r="4" fill="#4caf50" opacity="0.4"/>
    <circle cx="-45" cy="15" r="3" fill="#4caf50" opacity="0.3"/>
    <circle cx="45" cy="15" r="3" fill="#4caf50" opacity="0.3"/>
  </g>
  <text x="200" y="260" text-anchor="middle" fill="#1b5e20" font-size="18" font-weight="bold" font-family="Arial, sans-serif">PM-KISAN Apply</text>
  <text x="200" y="280" text-anchor="middle" fill="#2e7d32" font-size="11" font-family="Arial">₹6,000/year Direct Benefit</text>
</svg>
