<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Card -->
  <rect x="100" y="65" width="200" height="125" rx="12" fill="#fff" stroke="#c62828" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold" font-family="Arial">INCOME TAX DEPT</text>
  <rect x="125" y="108" width="150" height="18" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="200" y="121" text-anchor="middle" fill="#c62828" font-size="11" font-weight="bold" font-family="monospace">ABCDE1234F</text>
  <rect x="125" y="135" width="100" height="6" rx="3" fill="#ef9a9a"/>
  <rect x="125" y="150" width="80" height="6" rx="3" fill="#ef9a9a"/>
  <!-- Wrench/tool icon -->
  <g transform="translate(310, 90)">
    <circle cx="0" cy="0" r="22" fill="#c62828"/>
    <path d="M-6-8 L-2-4 L-6 0 L-10-4 Z" fill="#fff"/>
    <path d="M-2-4 L8 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="9" cy="7" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
  <!-- Checkmark corrections -->
  <g transform="translate(200, 230)">
    <circle cx="0" cy="0" r="22" fill="#c62828" opacity="0.15"/>
    <path d="M-8 0 L-3 5 L8-6" fill="none" stroke="#c62828" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#c62828" font-size="18" font-weight="bold" font-family="Arial, sans-serif">PAN Correction</text>
</svg>
