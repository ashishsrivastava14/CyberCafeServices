  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- License card -->
  <rect x="80" y="55" width="240" height="145" rx="12" fill="#fff" stroke="#004d40" stroke-width="2.5"/>
  <!-- Photo area -->
  <rect x="95" y="70" width="55" height="60" rx="6" fill="#e0f2f1" stroke="#004d40" stroke-width="1.5"/>
  <circle cx="122" cy="88" r="13" fill="#004d40" opacity="0.3"/>
  <path d="M108 120 Q122 108 137 120" fill="#004d40" opacity="0.3"/>
  <!-- License details -->
