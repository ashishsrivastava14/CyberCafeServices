    <circle cx="-25" cy="12" r="8" fill="#004d40" opacity="0.4"/>
    <circle cx="25" cy="12" r="8" fill="#004d40" opacity="0.4"/>
  </g>
  <text x="200" y="285" text-anchor="middle" fill="#004d40" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Permanent License</text>
