  <rect x="168" y="90" width="135" height="6" rx="3" fill="#80cbc4"/>
  <rect x="168" y="104" width="110" height="6" rx="3" fill="#b2dfdb"/>
  <rect x="168" y="118" width="120" height="6" rx="3" fill="#b2dfdb"/>
